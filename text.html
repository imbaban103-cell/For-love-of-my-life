<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Attshu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#020024,#090979,#000000);
overflow:hidden;
color:white;
text-align:center;
font-family:'Poppins',sans-serif;
}

.container{
position:absolute;
width:100%;
}

h1{font-size:3rem}
h2{font-size:2rem}
h3{font-size:1.4rem}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

/* floating hearts */

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* buttons */

button{
padding:14px 30px;
border:none;
border-radius:40px;
background:white;
color:#ff5f6d;
font-size:1rem;
cursor:pointer;
font-weight:600;
transition:.3s
}

button:hover{
background:#ff5f6d;
color:white;
transform:scale(1.1)
}

/* heart button */

.heart-btn{
font-size:75px;
cursor:pointer;
animation:pulse 1.2s infinite
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* hidden sections */

#mainContent,#quiz,#giftPage{display:none}

/* gift */

.gift-box{
font-size:100px;
cursor:pointer;
animation:shake 1.5s infinite
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(5deg)}
50%{transform:rotate(-5deg)}
75%{transform:rotate(5deg)}
100%{transform:rotate(0)}
}

/* BIG LOVE TEXT */

#bigLove{
position:absolute;
top:40%;
width:100%;
font-size:3.2rem;
font-family:'Poppins',sans-serif;
font-weight:700;
letter-spacing:2px;
text-shadow:0 0 10px #ff4b6e,0 0 20px #ff4b6e;
opacity:0;
transform:scale(0);
}

.showLove{
animation:pop 1.2s forwards;
}

@keyframes pop{
0%{opacity:0;transform:scale(0)}
60%{opacity:1;transform:scale(1.4)}
100%{opacity:1;transform:scale(1)}
}

/* mwaah texts */

.loveText{
position:absolute;
font-size:1.2rem;
animation:floatText linear infinite;
opacity:0;
}

@keyframes floatText{
0%{transform:translateY(100vh);opacity:0}
30%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

</style>
</head>
<body>

<div class="container" id="opening">
<h1>Welcome Kanmanii 💖</h1>
<p>Tap the heart 🥺</p>
<div class="heart-btn" onclick="openPage()">❤️</div>
</div>

<div class="container" id="mainContent">
<h1>Hey My Love ❤️</h1>
</div>

<div class="container" id="quiz">
<h2>Before your surprise a quick question 😊</h2>
<h3>Who is your Boyfriend? 💕</h3>

<button onclick="handleAnswer()">A. Branaw 😏</button><br><br>
<button onclick="handleAnswer()">B. A 👀</button><br><br>
<button onclick="handleAnswer()">C. Branawan 😌</button><br><br>
<button onclick="handleAnswer()">D. All of the above 💖</button>

<p id="response"></p>
</div>

<div class="container" id="giftPage">
<div class="gift-box" id="giftBox" onclick="openGift()">🎁</div>
<h1 id="bigLove">I LOVEEE YOUU PONDATIII ❤️</h1>
</div>

<script>

/* stars */

function createStars(){
for(let i=0;i<120;i++){
let star=document.createElement("div")
star.className="star"
star.style.top=Math.random()*100+"vh"
star.style.left=Math.random()*100+"vw"
document.body.appendChild(star)
}
}
createStars()

/* floating hearts */

function createHearts(){
for(let i=0;i<30;i++){
let h=document.createElement('div')
h.className='heart'
h.innerHTML='💖'
h.style.left=Math.random()*100+'vw'
h.style.animationDuration=(Math.random()*3+3)+'s'
document.body.appendChild(h)
}
}
createHearts()

function openPage(){
document.getElementById("opening").style.display="none"
document.getElementById("mainContent").style.display="block"

setTimeout(()=>{
document.getElementById("mainContent").style.display="none"
document.getElementById("quiz").style.display="block"
},2000)
}

function handleAnswer(){

document.getElementById("response").innerHTML="Aww good girl… you know your man 😊❤️"

setTimeout(()=>{
document.getElementById("quiz").style.display="none"
document.getElementById("giftPage").style.display="block"
},1500)

}

function openGift(){

document.getElementById("giftBox").style.display="none"

let love=document.getElementById("bigLove")
love.classList.add("showLove")

createLoveExplosion()

}

function createLoveExplosion(){

setInterval(()=>{

for(let i=0;i<6;i++){

let t=document.createElement("div")

t.className="loveText"

t.innerHTML="Mwaaaaaahhh 😘💋"

t.style.left=Math.random()*100+"vw"

t.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(t)

}

},800)

}

</script>

</body>
</html>
